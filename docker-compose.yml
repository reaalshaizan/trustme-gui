services:
  trustme:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustme
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:5000"
    environment:
      - PORT=5000
      - DEBUG=${DEBUG:-false}
      - REPORTS_DIR=/app/reports
    volumes:
      - ./reports:/app/reports
    networks:
      - trustme-net
    cap_add:
      - NET_RAW        # needed for nmap ICMP (may be ignored in rootless Podman)
    # NET_ADMIN removed — not needed for TCP scanning and rejected by rootless Podman
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: trustme-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - trustme
    networks:
      - trustme-net
    profiles:
      - production   # only starts with: docker compose --profile production up

networks:
  trustme-net:
    driver: bridge
